features:
- name: Email and Account Breach Lookup
  description: APIs like Have I Been Pwned let consumers and security teams check
    whether an email address, username, or phone number has appeared in known data
    breaches and stealer log corpora.
- name: Pwned Password Checking (K-Anonymity)
  description: The Pwned Passwords API exposes 800+ million breached password hashes
    through a k-anonymity protocol, letting applications block known-compromised credentials
    without transmitting full hashes.
- name: Dark Web and Underground Forum Monitoring
  description: Enterprise breach intelligence platforms continuously scrape dark-web
    marketplaces, ransomware leak sites, Telegram channels, and underground forums
    for mentions of customer data, executives, brands, and credentials.
- name: Stealer Log and Credential Exposure Feeds
  description: Modern breach intelligence increasingly centers on infostealer malware
    logs (RedLine, Raccoon, Vidar, LummaC2) that capture browser-stored credentials,
    session cookies, and crypto wallets at scale.
- name: Ransomware Leak-Site Tracking
  description: Threat intelligence APIs track ransomware group leak sites (LockBit,
    Cl0p, ALPHV, Akira) to surface newly disclosed victim organizations and stolen
    data postings as they appear.
- name: Vulnerability and Exposure Feeds
  description: Authoritative vulnerability databases (NVD, CISA KEV) and commercial
    exposure platforms (Qualys, Rapid7, Tanium) expose CVE, CVSS, and known-exploited-vulnerability
    metadata via API.
- name: Regulatory Breach Notification Feeds
  description: Government authorities (FTC, state AGs, EU DPAs, HHS) publish disclosed
    breach filings; security teams ingest these feeds to track third-party and supply-chain
    breach exposure.
- name: Credential Stuffing Defense
  description: Identity providers (Okta, Auth0) and password managers (1Password,
    Bitwarden, LastPass) integrate with breach feeds to block re-use of known-compromised
    passwords and force resets on exposed accounts.
use_cases:
- name: Employee Credential Exposure Monitoring
  description: Security teams continuously query breach intelligence APIs for corporate
    email domains to detect employee credentials exposed in third-party breaches and
    infostealer logs, triggering forced password resets.
- name: Customer Account Takeover Prevention
  description: Consumer applications integrate Pwned Passwords and breach lookup APIs
    at signup and login to block known-compromised credentials and notify customers
    of exposure.
- name: Executive and VIP Protection
  description: Brand and executive protection teams use dark-web monitoring APIs to
    detect doxxing, leaked personal data, and impersonation targeting C-suite, board
    members, and high-value employees.
- name: Third-Party and Supply-Chain Risk
  description: GRC teams ingest breach-notification feeds and regulatory disclosures
    via API to track breach incidents at vendors, suppliers, and partners that handle
    their data.
- name: Ransomware Victim Intelligence
  description: Threat intel teams subscribe to ransomware leak-site feeds via API
    to alert on newly named victims relevant to their industry, supply chain, or geography.
- name: Vulnerability Prioritization
  description: Vulnerability management teams combine NVD CVE data, CISA's Known Exploited
    Vulnerabilities (KEV) catalog, and commercial exposure platforms to prioritize
    patching based on breach exploitation evidence.
- name: Regulatory Breach Disclosure Compliance
  description: Privacy and legal teams query FTC, state AG, and EU DPA breach-notification
    APIs to track required disclosures and benchmark their own incident response.
- name: AI Agent Breach Triage
  description: AI agents wired to breach intelligence APIs autonomously enrich security
    alerts with exposure context, correlate stolen credentials with active sessions,
    and draft incident-response runbooks.
integrations:
- name: Have I Been Pwned
  description: The canonical consumer breach-lookup service with 13+ billion breached
    accounts and 800+ million pwned passwords accessible via free and paid API tiers.
- name: CrowdStrike Falcon Intelligence
  description: Enterprise threat intelligence platform with adversary tracking, dark-web
    monitoring, and breach exposure feeds delivered via the Falcon API.
- name: Microsoft Defender Threat Intelligence
  description: Threat intelligence and breach exposure feeds integrated across Microsoft
    Defender, Sentinel, and Graph Security APIs.
- name: Splunk Enterprise Security
  description: SIEM platform that ingests breach intelligence and credential exposure
    feeds for correlation against authentication and access logs.
- name: CISA Known Exploited Vulnerabilities (KEV)
  description: Authoritative catalog of CVEs with evidence of active exploitation,
    published by the US Cybersecurity and Infrastructure Security Agency as a machine-readable
    feed.
- name: NVD CVE API
  description: The National Vulnerability Database REST API exposing CVE records,
    CVSS scores, CPE mappings, and CWE classifications used as the foundation of breach
    root-cause analysis.
- name: Okta and Auth0
  description: Identity platforms that integrate breach-password feeds to block known-compromised
    credentials and trigger step-up authentication on suspected account takeover.
- name: 1Password Watchtower
  description: Consumer and enterprise password manager that surfaces breach exposure
    for stored credentials via integration with Have I Been Pwned and proprietary
    feeds.
